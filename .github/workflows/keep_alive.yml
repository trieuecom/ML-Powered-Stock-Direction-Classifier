name: Ping Supabase (insert keep-alive row)

on: 
  schedule: 
    # Run at 00:00 UTC every 3 days
    - cron: '0 0 * * 1,3,5'
  workflow_dispatch: # Manually run on Github to test scheduling 

jobs: 
  ping_supabase: 
    runs-on: ubuntu-latest

    steps: 
    - name: Send a ping request to Supabase to keep it alive
      run: |
        curl -X POST "${{ secrets.SUPABASE_URL }}/rest/v1/keep_alive" \
            -H "apikey: ${{ secrets.SUPABASE_SECRET_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SECRET_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d '{"pinged_at": "'"$(date -u +%FT%TZ)"'"}' \
            --fail
